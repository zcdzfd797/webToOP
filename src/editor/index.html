<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>HTML to Video - 编辑器</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: "Microsoft YaHei", sans-serif; background:#1a1a2e; color:#e0e0e0; height:100vh; display:flex; flex-direction:column; }

  /* Topbar */
  .topbar { background:#16213e; padding:14px 24px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #2a2a4a; }
  .topbar h1 { font-size:20px; color:#00e5ff; display:flex; align-items:center; gap:10px; }
  .topbar .badge { font-size:12px; background:#0f3460; color:#00e5ff; padding:2px 10px; border-radius:10px; }
  .btn { border:none; border-radius:8px; padding:10px 24px; font-size:15px; cursor:pointer; transition:all .2s; font-weight:600; }
  .btn-primary { background:linear-gradient(135deg,#00e5ff,#2196f3); color:#fff; }
  .btn-primary:hover { transform:translateY(-1px); box-shadow:0 4px 20px rgba(0,229,255,.4); }
  .btn-primary:disabled { opacity:.5; cursor:not-allowed; transform:none; }
  .btn-sm { padding:6px 14px; font-size:13px; border-radius:6px; background:#2a2a4a; color:#ccc; border:1px solid #3a3a5a; }
  .btn-sm:hover { background:#3a3a5a; color:#fff; }
  .btn-danger { padding:6px 14px; font-size:13px; border-radius:6px; background:#3a1020; color:#ff5252; border:1px solid #5a2040; cursor:pointer; }

  /* Main layout */
  .main { flex:1; display:flex; overflow:hidden; }

  /* Left panel */
  .panel-left { width:440px; min-width:440px; background:#16213e; overflow-y:auto; padding:20px; }
  .panel-right { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#0d0d1a; padding:20px; position:relative; }

  /* Form sections */
  .section { margin-bottom:24px; }
  .section-title { font-size:14px; font-weight:700; color:#00e5ff; margin-bottom:12px; padding-bottom:6px; border-bottom:1px solid #2a2a4a; display:flex; align-items:center; gap:8px; }
  .field { margin-bottom:14px; }
  .field label { display:block; font-size:13px; color:#999; margin-bottom:5px; }
  .field input[type="text"], .field input[type="number"], .field select, .field textarea {
    width:100%; padding:8px 12px; border-radius:6px; border:1px solid #2a2a4a; background:#0d1b2a; color:#e0e0e0; font-size:14px;
  }
  .field input:focus, .field select:focus { outline:none; border-color:#00e5ff; }
  .field-row { display:flex; gap:12px; }
  .field-row .field { flex:1; }
  .color-field { display:flex; align-items:center; gap:8px; }
  .color-field input[type="color"] { width:48px; height:36px; border:none; border-radius:6px; cursor:pointer; background:none; }
  .color-field input[type="text"] { flex:1; }

  /* Action items */
  .action-item { background:#0d1b2a; border:1px solid #2a2a4a; border-radius:8px; padding:14px; margin-bottom:10px; }
  .action-item .action-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .action-item .action-header span { font-size:13px; color:#999; }

  /* Preview */
  .preview-wrapper { position:relative; border-radius:12px; overflow:hidden; box-shadow:0 8px 40px rgba(0,0,0,.6); }
  .preview-iframe { border:none; display:block; transform-origin:top left; }
  .preview-label { position:absolute; top:12px; left:16px; background:rgba(0,0,0,.6); color:#00e5ff; font-size:12px; padding:4px 12px; border-radius:12px; z-index:10; }
  .preview-dims { position:absolute; bottom:12px; right:16px; background:rgba(0,0,0,.6); color:#aaa; font-size:12px; padding:4px 12px; border-radius:12px; z-index:10; }

  /* Progress overlay */
  .overlay { position:absolute; inset:0; background:rgba(10,10,26,.92); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:100; border-radius:12px; }
  .overlay.show { display:flex; }
  .spinner { width:60px; height:60px; border:4px solid #1a1a2e; border-top-color:#00e5ff; border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .overlay-text { margin-top:20px; font-size:16px; color:#00e5ff; }
  .overlay-sub { margin-top:8px; font-size:13px; color:#888; }

  /* Download link */
  .download-bar { margin-top:16px; display:none; }
  .download-bar.show { display:flex; align-items:center; gap:12px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width:8px; }
  ::-webkit-scrollbar-track { background:#0d0d1a; }
  ::-webkit-scrollbar-thumb { background:#2a2a4a; border-radius:4px; }
  ::-webkit-scrollbar-thumb:hover { background:#3a3a5a; }

  .preset-btns { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
  .preset-btn { padding:6px 12px; font-size:12px; border-radius:6px; border:1px solid #2a2a4a; background:#0d1b2a; color:#aaa; cursor:pointer; }
  .preset-btn:hover { border-color:#00e5ff; color:#00e5ff; }

  /* Avatar upload */
  .avatar-upload { display:flex; align-items:center; gap:16px; }
  .avatar-preview { width:100px; height:100px; border-radius:50%; overflow:hidden; border:2px solid #2a2a4a; background:#0d1b2a; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .avatar-preview img { width:100%; height:100%; object-fit:cover; }
  .avatar-controls { display:flex; flex-direction:column; gap:8px; }
  .upload-btn { display:inline-block; padding:8px 18px; border-radius:8px; background:linear-gradient(135deg,#2196f3,#00e5ff); color:#fff; font-size:14px; cursor:pointer; text-align:center; transition:all .2s; }
  .upload-btn:hover { transform:translateY(-1px); box-shadow:0 4px 16px rgba(0,229,255,.3); }
  .avatar-upload.dragging .avatar-preview { border-color:#00e5ff; box-shadow:0 0 20px rgba(0,229,255,.4); }

  /* Drag layer for custom texts */
  .drag-layer { position:absolute; inset:0; z-index:20; pointer-events:none; }
  .drag-item {
    position:absolute; transform:translate(-50%,-50%);
    pointer-events:auto; cursor:grab; padding:4px 10px;
    border:1px dashed rgba(0,229,255,.5); border-radius:4px;
    background:rgba(0,229,255,.05); white-space:nowrap;
    user-select:none; font-family:"Microsoft YaHei",sans-serif;
    transition:border-color .2s;
  }
  .drag-item:hover { border-color:#00e5ff; background:rgba(0,229,255,.12); }
  .drag-item.dragging { cursor:grabbing; border-style:solid; border-color:#00e5ff; background:rgba(0,229,255,.2); }
  .drag-item-num { position:absolute; top:-8px; right:-8px; width:16px; height:16px; background:#00e5ff; color:#000; border-radius:50%; font-size:10px; display:flex; align-items:center; justify-content:center; font-weight:700; }

  /* Text items in form */
  .text-item { background:#0d1b2a; border:1px solid #2a2a4a; border-radius:8px; padding:14px; margin-bottom:10px; }
  .text-item .text-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }

  /* Saved configs */
  .saved-item { display:flex; align-items:center; gap:8px; padding:8px 12px; background:#0d1b2a; border:1px solid #2a2a4a; border-radius:6px; margin-bottom:6px; }
  .saved-item .saved-name { flex:1; font-size:13px; color:#ccc; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .saved-item:hover { border-color:#00e5ff; }
  .save-status { font-size:12px; color:#666; margin-bottom:10px; transition:color .3s; }
  .save-status.saved { color:#00e5ff; }
  .config-row { display:flex; gap:8px; margin-bottom:10px; }
  .config-row input { flex:1; padding:8px 12px; border-radius:6px; border:1px solid #2a2a4a; background:#0d1b2a; color:#e0e0e0; font-size:14px; }
  .config-row input:focus { outline:none; border-color:#00e5ff; }

  /* BGM */
  .bgm-section { display:flex; flex-direction:column; gap:10px; }
  .bgm-file-info { display:flex; align-items:center; gap:10px; }
  .bgm-file-info .filename { flex:1; font-size:13px; color:#aaa; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .bgm-volume-row { display:flex; align-items:center; gap:10px; }
  .bgm-volume-row label { font-size:13px; color:#999; white-space:nowrap; }
  .bgm-volume-row input[type="range"] { flex:1; accent-color:#00e5ff; }
  .bgm-volume-row .vol-val { font-size:12px; color:#00e5ff; min-width:32px; text-align:right; }
  audio { width:100%; height:36px; border-radius:6px; }
  .bgm-empty { font-size:13px; color:#666; padding:10px; text-align:center; background:#0d1b2a; border:1px dashed #2a2a4a; border-radius:6px; }
</style>
</head>
<body>

<div class="topbar">
  <h1>HTML to Video <span class="badge">1080p</span></h1>
  <div style="display:flex; gap:10px; align-items:center;">
    <span id="statusText" style="font-size:13px; color:#888;"></span>
    <button class="btn btn-primary" id="generateBtn">生成 MP4</button>
  </div>
</div>

<div class="main">
  <!-- LEFT: Form -->
  <div class="panel-left" id="formPanel">

    <div class="preset-btns">
      <button class="preset-btn" onclick="loadPreset('default')">紫色三连</button>
      <button class="preset-btn" onclick="loadPreset('dark')">深蓝科技</button>
      <button class="preset-btn" onclick="loadPreset('warm')">暖色卡哇伊</button>
      <button class="preset-btn" onclick="loadPreset('green')">暗夜荧光</button>
    </div>

    <!-- Save / Load configs -->
    <div class="section">
      <div class="section-title">我的配置</div>
      <div class="save-status" id="saveStatus">尚未保存</div>
      <div class="config-row">
        <input type="text" id="presetName" placeholder="输入配置名称..." onkeydown="if(event.key==='Enter')saveUserPreset()">
        <button class="btn-sm" id="savePresetBtn" onclick="saveUserPreset()">保存</button>
      </div>
      <div id="savedList"></div>
      <div style="display:flex; gap:8px; margin-top:8px;">
        <button class="btn-sm" onclick="exportConfig()">导出 JSON</button>
        <button class="btn-sm" onclick="document.getElementById('importFile').click()">导入 JSON</button>
        <input type="file" id="importFile" accept=".json" style="display:none;">
      </div>
    </div>

    <!-- Video settings -->
    <div class="section">
      <div class="section-title">视频参数</div>
      <div class="field-row">
        <div class="field">
          <label>时长 (秒)</label>
          <input type="number" id="cfg-duration" value="4" min="1" max="60">
        </div>
        <div class="field">
          <label>帧率 (FPS)</label>
          <input type="number" id="cfg-fps" value="30" min="10" max="60">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>宽度</label>
          <input type="number" id="cfg-width" value="1920">
        </div>
        <div class="field">
          <label>高度</label>
          <input type="number" id="cfg-height" value="1080">
        </div>
      </div>
    </div>

    <!-- Scene -->
    <div class="section">
      <div class="section-title">背景设置</div>
      <div class="field">
        <label>背景渐变 (CSS)</label>
        <textarea id="cfg-bg" rows="2">linear-gradient(135deg, #3a1c5e 0%, #5b2a8c 40%, #7b3fb5 70%, #4a2378 100%)</textarea>
      </div>
      <div class="field-row">
        <div class="field">
          <label>辉光颜色</label>
          <div class="color-field">
            <input type="color" id="cfg-glowColor-picker" value="#a05aff">
            <input type="text" id="cfg-glowColor" value="rgba(160,90,255,0.35)">
          </div>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>网格颜色</label>
          <input type="text" id="cfg-gridColor" value="rgba(255,255,255,0.04)">
        </div>
        <div class="field">
          <label>网格大小</label>
          <input type="text" id="cfg-gridSize" value="48px">
        </div>
      </div>
      <div class="field">
        <label>背景动效</label>
        <select id="cfg-bgEffect">
          <option value="none">无</option>
          <option value="particles">粒子上升</option>
          <option value="bokeh">光斑漂浮</option>
          <option value="stars">星空闪烁</option>
          <option value="bubbles">气泡上升</option>
          <option value="aurora">极光流动</option>
          <option value="rays">光线旋转</option>
          <option value="snow">雪花飘落</option>
          <option value="grid-pulse">网格脉冲</option>
          <option value="gradient-shift">渐变流动</option>
        </select>
      </div>
    </div>

    <!-- Avatar -->
    <div class="section">
      <div class="section-title">头像</div>
      <div class="avatar-upload" id="avatarUploadArea">
        <div class="avatar-preview" id="avatarPreview">
          <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;">
            <ellipse cx="100" cy="115" rx="60" ry="68" fill="#FFD93D"/>
            <ellipse cx="100" cy="135" rx="40" ry="42" fill="#FFE74C"/>
            <ellipse cx="58" cy="120" rx="22" ry="35" fill="#FFC107" transform="rotate(-15 58 120)"/>
            <ellipse cx="142" cy="120" rx="22" ry="35" fill="#FFC107" transform="rotate(15 142 120)"/>
            <path d="M 85 50 Q 80 32 90 38 Q 100 28 95 42 Q 105 30 108 44" fill="#FFC107" stroke="#E0A800" stroke-width="1.5" stroke-linejoin="round"/>
            <circle cx="80" cy="88" r="16" fill="#fff"/><circle cx="120" cy="88" r="16" fill="#fff"/>
            <circle cx="83" cy="90" r="9" fill="#222"/><circle cx="123" cy="90" r="9" fill="#222"/>
            <circle cx="86" cy="86" r="3.5" fill="#fff"/><circle cx="126" cy="86" r="3.5" fill="#fff"/>
            <ellipse cx="65" cy="110" rx="12" ry="8" fill="#FF8A80" opacity="0.6"/>
            <ellipse cx="135" cy="110" rx="12" ry="8" fill="#FF8A80" opacity="0.6"/>
            <path d="M 88 108 L 112 108 L 100 125 Z" fill="#5C6BC0"/>
            <rect x="85" y="170" width="8" height="18" rx="3" fill="#FF8F00"/>
            <rect x="107" y="170" width="8" height="18" rx="3" fill="#FF8F00"/>
          </svg>
        </div>
        <div class="avatar-controls">
          <label class="upload-btn" for="avatarFile">选择图片上传</label>
          <input type="file" id="avatarFile" accept="image/*" style="display:none;">
          <button class="btn-sm" id="resetAvatarBtn">恢复默认</button>
        </div>
        <input type="hidden" id="cfg-avatarUrl" value="">
      </div>
      <div class="field" style="margin-top:10px;">
        <label>头像尺寸</label>
        <input type="number" id="cfg-avatarSize" value="280">
      </div>
      <div class="field">
        <label>头像动效</label>
        <select id="cfg-avatarEffect">
          <option value="none">无</option>
          <option value="ring-rotate">旋转彩环</option>
          <option value="breathe">呼吸缩放</option>
          <option value="float">上下浮动</option>
          <option value="glow-pulse">光晕脉冲</option>
          <option value="tilt">左右摇摆</option>
          <option value="bounce">弹跳</option>
          <option value="sparkle">星光闪烁</option>
        </select>
      </div>
    </div>

    <!-- Title -->
    <div class="section">
      <div class="section-title">标题文字</div>
      <div class="field">
        <label>标题内容</label>
        <input type="text" id="cfg-titleText" value="脑子暂存处">
      </div>
      <div class="field-row">
        <div class="field">
          <label>字号</label>
          <input type="text" id="cfg-titleSize" value="84px">
        </div>
        <div class="field">
          <label>颜色</label>
          <div class="color-field">
            <input type="color" id="cfg-titleColor-picker" value="#ffffff">
            <input type="text" id="cfg-titleColor" value="#fff">
          </div>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>字重</label>
          <select id="cfg-titleWeight">
            <option value="400">正常 400</option>
            <option value="700">粗体 700</option>
            <option value="900" selected>特粗 900</option>
          </select>
        </div>
        <div class="field">
          <label>字间距</label>
          <input type="text" id="cfg-titleSpacing" value="4px">
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="section">
      <div class="section-title">
        互动图标
        <button class="btn-sm" onclick="addAction()" style="margin-left:auto;">+ 添加</button>
      </div>
      <div id="actionsList"></div>
    </div>

    <!-- Custom Texts -->
    <div class="section">
      <div class="section-title">
        自定义文字
        <span style="font-size:11px;color:#888;font-weight:400;margin-left:8px;">拖拽预览区调整位置</span>
        <button class="btn-sm" onclick="addText()" style="margin-left:auto;">+ 添加</button>
      </div>
      <div id="textsList"></div>
    </div>

    <!-- BGM -->
    <div class="section">
      <div class="section-title">背景音乐</div>
      <div class="bgm-section">
        <div class="bgm-file-info">
          <label class="upload-btn" for="bgmFile">选择音频</label>
          <input type="file" id="bgmFile" accept="audio/*" style="display:none;">
          <span class="filename" id="bgmFileName">未选择</span>
          <button class="btn-danger" id="bgmClearBtn" style="display:none;">清除</button>
        </div>
        <div id="bgmPlayerWrap" style="display:none;">
          <audio id="bgmPlayer" controls></audio>
        </div>
        <div class="bgm-volume-row">
          <label>音量</label>
          <input type="range" id="cfg-bgmVolume" min="0" max="1" step="0.05" value="0.6">
          <span class="vol-val" id="bgmVolVal">60%</span>
        </div>
        <div class="field">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
            <input type="checkbox" id="cfg-bgmLoop" style="width:auto;"> 音频较短时循环播放
          </label>
        </div>
      </div>
    </div>

  </div>

  <!-- RIGHT: Preview -->
  <div class="panel-right">
    <div class="preview-wrapper" id="previewWrapper">
      <div class="preview-label">实时预览</div>
      <div class="preview-dims" id="previewDims">1920 x 1080</div>
      <iframe class="preview-iframe" id="previewFrame" width="1920" height="1080"></iframe>
      <div class="drag-layer" id="dragLayer"></div>
      <div class="overlay" id="overlay">
        <div class="spinner"></div>
        <div class="overlay-text" id="overlayText">正在生成视频...</div>
        <div class="overlay-sub" id="overlaySub">请稍候</div>
      </div>
    </div>
    <div class="download-bar" id="downloadBar">
      <a class="btn btn-primary" id="downloadLink" href="#">下载视频</a>
      <button class="btn-sm" onclick="document.getElementById('downloadBar').classList.remove('show')">关闭</button>
    </div>
  </div>
</div>

<script>
const PRESETS = {
  default: {
    duration:4, fps:30,
    scene: { background:"linear-gradient(135deg, #3a1c5e 0%, #5b2a8c 40%, #7b3fb5 70%, #4a2378 100%)", glowColor:"rgba(160,90,255,0.35)", gridColor:"rgba(255,255,255,0.04)", gridSize:"48px", effect:"particles" },
    avatar: { size:280, imageUrl:"", effect:"ring-rotate" },
    title: { text:"脑子暂存处", fontSize:"84px", fontWeight:900, color:"#fff", letterSpacing:"4px" },
    actions: [
      { label:"点赞", icon:"like", activeColor:"#ff4081", delay:2.3 },
      { label:"投币", icon:"coin", activeColor:"#2196f3", delay:2.7 },
      { label:"收藏", icon:"star", activeColor:"#ffd700", delay:3.1 }
    ],
    texts: [],
    timings: { bgFadeIn:0.1, avatarPopIn:0.5, titleFadeUp:1.0, iconAppearStart:1.5, iconAppearStep:0.2 }
  },
  dark: {
    duration:5, fps:30,
    scene: { background:"linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 40%, #16213e 70%, #0f3460 100%)", glowColor:"rgba(0,180,255,0.3)", gridColor:"rgba(0,200,255,0.06)", gridSize:"52px", effect:"stars" },
    avatar: { size:260, imageUrl:"", effect:"glow-pulse" },
    title: { text:"极客实验室", fontSize:"76px", fontWeight:900, color:"#00e5ff", letterSpacing:"6px" },
    actions: [
      { label:"关注", icon:"heart", activeColor:"#ff1744", delay:2.5 },
      { label:"转发", icon:"share", activeColor:"#00e676", delay:3.0 },
      { label:"热门", icon:"fire", activeColor:"#ff6d00", delay:3.5 }
    ],
    texts: [],
    timings: { bgFadeIn:0.1, avatarPopIn:0.5, titleFadeUp:1.0, iconAppearStart:1.5, iconAppearStep:0.2 }
  },
  warm: {
    duration:4, fps:30,
    scene: { background:"linear-gradient(135deg, #ff9a8b 0%, #ff6a88 40%, #ff99ac 70%, #fcb69f 100%)", glowColor:"rgba(255,255,255,0.4)", gridColor:"rgba(255,255,255,0.1)", gridSize:"44px", effect:"bokeh" },
    avatar: { size:280, imageUrl:"", effect:"bounce" },
    title: { text:"甜心小屋", fontSize:"80px", fontWeight:900, color:"#fff", letterSpacing:"3px" },
    actions: [
      { label:"喜欢", icon:"heart", activeColor:"#e91e63", delay:2.3 },
      { label:"打call", icon:"bolt", activeColor:"#9c27b0", delay:2.7 },
      { label:"关注", icon:"star", activeColor:"#ff5722", delay:3.1 }
    ],
    texts: [],
    timings: { bgFadeIn:0.1, avatarPopIn:0.5, titleFadeUp:1.0, iconAppearStart:1.5, iconAppearStep:0.2 }
  },
  green: {
    duration:4, fps:30,

function toHex(rgba) {
  const m = rgba.match(/#([0-9a-f]{6})/i);
  if (m) return "#" + m[1];
  const nums = rgba.match(/\d+/g);
  if (nums && nums.length >= 3) {
    return "#" + nums.slice(0,3).map(n => parseInt(n).toString(16).padStart(2,"0")).join("");
  }
  return "#ffffff";
}

// ===== Drag layer rendering =====
function renderDragLayer() {
  const layer = document.getElementById("dragLayer");
  const wrapper = document.getElementById("previewWrapper");
  const iframe = document.getElementById("previewFrame");
  const config = readForm();
  const scale = parseFloat(iframe.style.transform.match(/scale\(([\d.]+)\)/)?.[1] || 1);

  layer.innerHTML = "";
  texts.forEach((t, i) => {
    const item = document.createElement("div");
    item.className = "drag-item";
    item.style.left = (t.x / 100 * wrapper.offsetWidth) + "px";
    item.style.top = (t.y / 100 * wrapper.offsetHeight) + "px";
    item.style.fontSize = Math.max(10, parseFloat(t.fontSize) * scale * 0.6) + "px";
    item.style.color = t.color;
    item.style.fontWeight = t.fontWeight;
    item.textContent = t.text;
    item.innerHTML += `<span class="drag-item-num">${i+1}</span>`;

    item.addEventListener("mousedown", (e) => startDrag(e, i));
    item.addEventListener("touchstart", (e) => startDrag(e.touches[0], i, true), { passive: false });

    layer.appendChild(item);
  });
}

function startDrag(e, index, isTouch) {
  e.preventDefault?.();
  const wrapper = document.getElementById("previewWrapper");
  const item = e.target?.classList?.contains("drag-item") ? e.target : e.target?.closest(".drag-item");
  if (item) item.classList.add("dragging");

  dragState = { index, wrapper, item };

  const moveHandler = (ev) => {
    const pt = isTouch ? ev.touches[0] : ev;
    if (!pt) return;
    ev.preventDefault?.();
    const rect = wrapper.getBoundingClientRect();
    let x = ((pt.clientX - rect.left) / rect.width) * 100;
    let y = ((pt.clientY - rect.top) / rect.height) * 100;
    x = Math.max(0, Math.min(100, x));
    y = Math.max(0, Math.min(100, y));
    texts[index].x = Math.round(x * 10) / 10;
    texts[index].y = Math.round(y * 10) / 10;

    // Move the drag item in real-time
    if (dragState.item) {
      dragState.item.style.left = (x / 100 * rect.width) + "px";
      dragState.item.style.top = (y / 100 * rect.height) + "px";
    }

    // Update text inputs
    const inputs = document.querySelectorAll(`#textsList .text-item:nth-child(${index+1}) input[type="number"]`);
    if (inputs[0]) inputs[0].value = texts[index].x;
    if (inputs[1]) inputs[1].value = texts[index].y;
  };

  const upHandler = () => {
    if (dragState?.item) dragState.item.classList.remove("dragging");
    dragState = null;
    document.removeEventListener("mousemove", moveHandler);
    document.removeEventListener("mouseup", upHandler);
    document.removeEventListener("touchmove", moveHandler);
    document.removeEventListener("touchend", upHandler);
    debouncePreview();
  };

  document.addEventListener("mousemove", moveHandler);
  document.addEventListener("mouseup", upHandler);
  document.addEventListener("touchmove", moveHandler, { passive: false });
  document.addEventListener("touchend", upHandler);
}

// ===== Preview =====
let previewTimer = null;
function debouncePreview() {
  clearTimeout(previewTimer);
  previewTimer = setTimeout(updatePreview, 300);
  autoSave();
}

function updatePreview() {
  const config = readForm();
  const frame = document.getElementById("previewFrame");
  const wrapper = document.getElementById("previewWrapper");

  // Fit preview to available space (maintain aspect ratio)
  const rightPanel = wrapper.parentElement;
  const availW = rightPanel.clientWidth - 60;
  const availH = rightPanel.clientHeight - 60;
  const scale = Math.min(availW / config.width, availH / config.height, 1);

  frame.width = config.width;
  frame.height = config.height;
  frame.style.transform = `scale(${scale})`;
  wrapper.style.width = (config.width * scale) + "px";
  wrapper.style.height = (config.height * scale) + "px";

  document.getElementById("previewDims").textContent = `${config.width} x ${config.height}`;

  fetch("/api/preview", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(config),
  })
  .then(r => r.json())
  .then(data => {
    if (data.ok) {
      frame.srcdoc = data.html;
    }
  })
  .finally(() => {
    setTimeout(renderDragLayer, 50);
  });
}

document.getElementById("generateBtn").addEventListener("click", async () => {

  const overlaySub = document.getElementById("overlaySub");
  const config = readForm();
  config.bgmData = bgmData;

  config.bgmLoop = document.getElementById("cfg-bgmLoop").checked;

  btn.disabled = true;

  overlayText.textContent = "正在生成视频...";
  const totalFrames = Math.round(config.duration * config.fps);
  overlaySub.textContent = `预计渲染 ${totalFrames} 帧，请耐心等待...`;

  try {
    const resp = await fetch("/api/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(config),
    });
    const data = await resp.json();

    if (data.ok) {
      overlayText.textContent = "生成成功!";
      overlaySub.textContent = `${config.width}x${config.height} · ${config.duration}s · ${config.fps}fps`;

      const dl = document.getElementById("downloadLink");

      dl.download = data.file;
      document.getElementById("downloadBar").classList.add("show");

      setTimeout(() => overlay.classList.remove("show"), 1200);

      throw new Error(data.error || "Unknown error");

  } catch (err) {
    overlayText.textContent = "生成失败";
    overlaySub.textContent = err.message;
    setTimeout(() => overlay.classList.remove("show"), 3000);
  } finally {
    btn.disabled = false;
  }
});

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ===== Save / Load configs =====
const STORAGE_KEY = "htmlToVideo:lastConfig";
const PRESETS_KEY = "htmlToVideo:userPresets";
let autoSaveTimer = null;

function autoSave() {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => {
    try {
      const config = readForm();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
      const el = document.getElementById("saveStatus");
      el.textContent = "已自动保存 " + new Date().toLocaleTimeString("zh-CN");
      el.classList.add("saved");
    } catch(e) { /* localStorage might be full (base64 avatar) */ }
  }, 600);
}

function getUserPresets() {
  try { return JSON.parse(localStorage.getItem(PRESETS_KEY) || "{}"); }
  catch { return {}; }
}

function saveUserPreset() {
  const name = document.getElementById("presetName").value.trim();
  if (!name) { document.getElementById("presetName").focus(); return; }
  const presets = getUserPresets();
  presets[name] = readForm();
  try {
    localStorage.setItem(PRESETS_KEY, JSON.stringify(presets));
    renderSavedList();
    const el = document.getElementById("saveStatus");
    el.textContent = `配置 "${name}" 已保存`;
    el.classList.add("saved");
  } catch(e) {
    alert("保存失败：存储空间不足（头像图片可能太大）。请使用较小的图片。");
  }
}

function loadSavedPreset(name) {
  const presets = getUserPresets();
  if (presets[name]) {
    writeForm(JSON.parse(JSON.stringify(presets[name])));
    document.getElementById("presetName").value = name;
    updatePreview();
  }
}

function deleteSavedPreset(name) {
  if (!confirm(`删除配置 "${name}"？`)) return;
  const presets = getUserPresets();
  delete presets[name];
  localStorage.setItem(PRESETS_KEY, JSON.stringify(presets));
  renderSavedList();
}

function renderSavedList() {
  const list = document.getElementById("savedList");
  const presets = getUserPresets();
  list.innerHTML = "";
  Object.keys(presets).forEach(name => {
    const div = document.createElement("div");
    div.className = "saved-item";
    div.innerHTML = `
      <span class="saved-name" title="${escapeHtml(name)}">${escapeHtml(name)}</span>
      <button class="btn-sm" onclick="loadSavedPreset('${escapeHtml(name)}')">加载</button>
      <button class="btn-danger" onclick="deleteSavedPreset('${escapeHtml(name)}')">删</button>
    `;
    list.appendChild(div);
  });
}

function exportConfig() {
  const config = readForm();
  const blob = new Blob([JSON.stringify(config, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `video-config-${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importConfig(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const config = JSON.parse(e.target.result);
      writeForm(config);
      updatePreview();
      const el = document.getElementById("saveStatus");
      el.textContent = "配置已导入";
      el.classList.add("saved");
    } catch {
      alert("导入失败：JSON 格式错误");
    }
  };
  reader.readAsText(file);
}

document.getElementById("importFile").addEventListener("change", (e) => {
  importConfig(e.target.files[0]);
  e.target.value = "";
});

// ===== Init =====
["cfg-duration","cfg-fps","cfg-width","cfg-height","cfg-bg","cfg-glowColor","cfg-gridColor",
"cfg-gridSize","cfg-avatarSize","cfg-avatarUrl","cfg-titleText","cfg-titleSize","cfg-titleWeight",
"cfg-titleColor","cfg-titleSpacing","cfg-bgEffect","cfg-avatarEffect"].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.addEventListener("input", debouncePreview);
});

// Load saved config on start: localStorage first, then server, then default
window.addEventListener("load", async () => {
  let loaded = false;
  // Try auto-saved config from localStorage
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const config = JSON.parse(saved);
      if (config && config.scene) {
        writeForm(config);
        loaded = true;
        const el = document.getElementById("saveStatus");
        el.textContent = "已恢复上次配置";
        el.classList.add("saved");
      }
    }
  } catch {}

  // Fallback to server config
  if (!loaded) {
    try {
      const resp = await fetch("/api/config");
      const config = await resp.json();
      if (config && !config.error) {
        writeForm(config);
      } else {
        loadPreset("default");
      }
    } catch {
      loadPreset("default");
    }
  }

  renderSavedList();
  updatePreview();
});

  window.addEventListener("resize", () => { debouncePreview(); setTimeout(renderDragLayer, 350); });
</script>
</body>
