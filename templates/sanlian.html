<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: "Noto Sans SC", "Microsoft YaHei", sans-serif;
  }

  /* ===== 紫色渐变网格背景 ===== */
  .scene {
    width: 1920px;
    height: 1080px;
    background: linear-gradient(135deg, #3a1c5e 0%, #5b2a8c 40%, #7b3fb5 70%, #4a2378 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    opacity: 0;
    animation: bgFadeIn 0.6s ease-out 0.1s forwards;
  }

  .grid-overlay {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  .glow {
    position: absolute;
    width: 800px;
    height: 800px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(160,90,255,0.35) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    animation: glowPulse 4s ease-in-out infinite;
  }

  /* ===== 居中内容容器 ===== */
  .content {
    text-align: center;
    position: relative;
    z-index: 2;
  }

  /* ===== 头像圆形 ===== */
  .avatar-ring {
    width: 280px;
    height: 280px;
    margin: 0 auto 40px;
    border-radius: 50%;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 80px rgba(160,90,255,0.5), 0 8px 40px rgba(0,0,0,0.3);
    opacity: 0;
    transform: scale(0.3);
    animation: avatarPopIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s forwards;
  }

  .bird {
    width: 200px;
    height: 200px;
  }

  /* ===== 文字标题 ===== */
  .title {
    font-size: 84px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 4px;
    margin-bottom: 70px;
    opacity: 0;
    transform: translateY(40px);
    text-shadow: 0 4px 24px rgba(0,0,0,0.4);
    animation: titleFadeUp 0.6s ease-out 1.0s forwards;
  }

  /* ===== 三连图标 ===== */
  .actions {
    display: flex;
    justify-content: center;
    gap: 100px;
  }

  .action {
    display: flex;
    flex-direction: column;
    align-items: center;
    opacity: 0;
    transform: translateY(30px) scale(0.5);
  }
  .action:nth-child(1) { animation: iconAppear 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 1.5s forwards; }
  .action:nth-child(2) { animation: iconAppear 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 1.7s forwards; }
  .action:nth-child(3) { animation: iconAppear 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 1.9s forwards; }

  .icon-circle {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.2);
    transition: all 0.3s ease;
  }

  .icon-circle svg {
    width: 56px;
    height: 56px;
    fill: #fff;
    transition: fill 0.3s ease, transform 0.3s ease;
  }

  .action-label {
    font-size: 24px;
    color: rgba(255,255,255,0.5);
    margin-top: 16px;
    font-weight: 700;
    transition: color 0.3s ease;
  }

  /* ===== 图标点亮动画 ===== */
  .action.like .icon-circle {
    animation: lightUpLike 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 2.3s forwards;
  }
  .action.like .icon-circle svg {
    animation: iconColorLike 0.4s ease 2.3s forwards;
  }
  .action.like .action-label {
    animation: labelActive 0.4s ease 2.3s forwards;
  }

  .action.coin .icon-circle {
    animation: lightUpCoin 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 2.7s forwards;
  }
  .action.coin .icon-circle svg {
    animation: iconColorCoin 0.4s ease 2.7s forwards;
  }
  .action.coin .action-label {
    animation: labelActive 0.4s ease 2.7s forwards;
  }

  .action.fav .icon-circle {
    animation: lightUpFav 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 3.1s forwards;
  }
  .action.fav .icon-circle svg {
    animation: iconColorFav 0.4s ease 3.1s forwards;
  }
  .action.fav .action-label {
    animation: labelActive 0.4s ease 3.1s forwards;
  }

  /* ===== Keyframes ===== */
  @keyframes bgFadeIn { to { opacity: 1; } }

  @keyframes glowPulse {
    0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
    50%      { opacity: 1;   transform: translate(-50%, -50%) scale(1.15); }
  }

  @keyframes avatarPopIn { to { opacity: 1; transform: scale(1); } }

  @keyframes titleFadeUp { to { opacity: 1; transform: translateY(0); } }

  @keyframes iconAppear { to { opacity: 1; transform: translateY(0) scale(1); } }

  @keyframes lightUpLike {
    to {
      background: rgba(255, 64, 129, 0.15);
      border-color: #ff4081;
      box-shadow: 0 0 40px rgba(255, 64, 129, 0.6);
      transform: scale(1.15);
    }
  }
  @keyframes iconColorLike { to { fill: #ff4081; transform: scale(1.1); } }

  @keyframes lightUpCoin {
    to {
      background: rgba(33, 150, 243, 0.15);
      border-color: #2196f3;
      box-shadow: 0 0 40px rgba(33, 150, 243, 0.6);
      transform: scale(1.15);
    }
  }
  @keyframes iconColorCoin { to { fill: #2196f3; transform: scale(1.1); } }

  @keyframes lightUpFav {
    to {
      background: rgba(255, 215, 0, 0.15);
      border-color: #ffd700;
      box-shadow: 0 0 40px rgba(255, 215, 0, 0.6);
      transform: scale(1.15);
    }
  }
  @keyframes iconColorFav { to { fill: #ffd700; transform: scale(1.1); } }

  @keyframes labelActive { to { color: rgba(255,255,255,0.95); } }
</style>
</head>
<body>
<div class="scene">
  <div class="grid-overlay"></div>
  <div class="glow"></div>

  <div class="content">
    <!-- 头像 -->
    <div class="avatar-ring">
      <svg class="bird" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <!-- 小鸟身体 -->
        <ellipse cx="100" cy="115" rx="60" ry="68" fill="#FFD93D"/>
        <!-- 腹部 -->
        <ellipse cx="100" cy="135" rx="40" ry="42" fill="#FFE74C"/>
        <!-- 翅膀 -->
        <ellipse cx="58" cy="120" rx="22" ry="35" fill="#FFC107" transform="rotate(-15 58 120)"/>
        <ellipse cx="142" cy="120" rx="22" ry="35" fill="#FFC107" transform="rotate(15 142 120)"/>
        <!-- 头顶毛 -->
        <path d="M 85 50 Q 80 32 90 38 Q 100 28 95 42 Q 105 30 108 44" fill="#FFC107" stroke="#E0A800" stroke-width="1.5" stroke-linejoin="round"/>
        <!-- 眼睛白底 -->
        <circle cx="80" cy="88" r="16" fill="#fff"/>
        <circle cx="120" cy="88" r="16" fill="#fff"/>
        <!-- 眼珠 -->
        <circle cx="83" cy="90" r="9" fill="#222"/>
        <circle cx="123" cy="90" r="9" fill="#222"/>
        <!-- 眼睛高光 -->
        <circle cx="86" cy="86" r="3.5" fill="#fff"/>
        <circle cx="126" cy="86" r="3.5" fill="#fff"/>
        <!-- 腮红 -->
        <ellipse cx="65" cy="110" rx="12" ry="8" fill="#FF8A80" opacity="0.6"/>
        <ellipse cx="135" cy="110" rx="12" ry="8" fill="#FF8A80" opacity="0.6"/>
        <!-- 喙 -->
        <path d="M 88 108 L 112 108 L 100 125 Z" fill="#5C6BC0"/>
        <!-- 脚 -->
        <rect x="85" y="170" width="8" height="18" rx="3" fill="#FF8F00"/>
        <rect x="107" y="170" width="8" height="18" rx="3" fill="#FF8F00"/>
      </svg>
    </div>

    <!-- 标题 -->
    <div class="title">脑子暂存处</div>

    <!-- 三连图标 -->
    <div class="actions">
      <!-- 点赞 -->
      <div class="action like">
        <div class="icon-circle">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/>
          </svg>
        </div>
        <div class="action-label">点赞</div>
      </div>

      <!-- 投币 -->
      <div class="action coin">
        <div class="icon-circle">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1.41 16.09V20h-2.67v-1.93c-1.71-.36-3.16-1.46-3.27-3.4h1.96c.1 1.05 1.18 1.91 2.53 1.91 1.38 0 2.36-.83 2.36-1.98 0-1.29-1.26-1.83-3.07-2.49-1.39-.51-3.31-1.28-3.31-3.34 0-1.69 1.25-2.92 3.13-3.27V4h2.67v1.95c1.59.39 2.84 1.55 2.92 3.24h-1.93c-.1-.85-1.04-1.62-2.42-1.62-1.41 0-2.31.7-2.31 1.71 0 1.05 1.1 1.6 2.79 2.18 1.86.63 3.59 1.51 3.59 3.68 0 1.73-1.27 2.94-3.17 3.27z"/>
          </svg>
        </div>
        <div class="action-label">投币</div>
      </div>

      <!-- 收藏 -->
      <div class="action fav">
        <div class="icon-circle">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
          </svg>
        </div>
        <div class="action-label">收藏</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
